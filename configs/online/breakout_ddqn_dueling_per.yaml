# Full-run Breakout RAM headline online agent: Double DQN + dueling + PER.
algorithm:
  double_dqn: true

experiment:
  name: breakout_ddqn_dueling_per
  seed: 42
  device: auto
  output_root: artifacts

env:
  id: ALE/Breakout-ram-v5

model:
  hidden_dims: [256, 256]
  dueling: true

train:
  total_steps: 2000000
  batch_size: 32
  replay_capacity: 100000
  learning_starts: 10000
  train_freq: 4
  gamma: 0.99
  lr: 1.0e-4
  target_update_interval: 1000
  checkpoint_interval: 50000
  grad_clip_norm: 10.0

exploration:
  epsilon_start: 1.0
  epsilon_end: 0.05
  decay_steps: 250000

eval:
  eval_interval: 50000
  n_episodes: 20
  epsilon_eval: 0.05

log:
  csv_flush_interval: 10
  episode_return_ema_alpha: 0.1

replay:
  prioritized: true
  alpha: 0.6
  beta_start: 0.4
  beta_end: 1.0
  beta_anneal_steps: 200000
  priority_eps: 1.0e-6
