# T1.4 smoke: Double DQN + dueling + proportional PER (single trainer path).
algorithm:
  double_dqn: true

experiment:
  name: pong_tiny_ddqn_dueling_per
  seed: 42
  device: auto
  output_root: artifacts

env:
  id: ALE/Pong-ram-v5

model:
  hidden_dims: [64, 64]
  dueling: true

train:
  total_steps: 5000
  batch_size: 32
  replay_capacity: 10000
  learning_starts: 500
  train_freq: 4
  gamma: 0.99
  lr: 2.5e-4
  target_update_interval: 200
  checkpoint_interval: 2500
  grad_clip_norm: 10.0

exploration:
  epsilon_start: 1.0
  epsilon_end: 0.05
  decay_steps: 3000

eval:
  eval_interval: 2500
  n_episodes: 2
  epsilon_eval: 0.05

log:
  csv_flush_interval: 1

replay:
  prioritized: true
  alpha: 0.6
  beta_start: 0.4
  beta_end: 1.0
  beta_anneal_steps: 5000
  priority_eps: 1.0e-6
